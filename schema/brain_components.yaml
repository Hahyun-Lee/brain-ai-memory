# Brain-AI Memory: component ontology
#
# A generic map from human brain systems to LLM-agent constructs. This is the
# single source of truth for "what are the parts, what does each do, and how does
# each fail." Prose docs should point here rather than restating the taxonomy,
# because a taxonomy copied into many files drifts (a component gets absorbed into a
# neighbor in one copy, renamed in another, and the count quietly changes).
#
# The mapping is deliberately at the level of *function*, not implementation.
# "Graph memory" or "input gate" is a role you can fill with whatever store or
# hook your stack provides. Keep the component IDs and software contracts stable.
# Region and neuroscience-inspiration fields are analogy metadata and should be
# revised when evidence warrants; no one-to-one localization or homology is implied.
#
# Grounding draws on public neuroscience reviews, but several mappings are
# theory-dependent. Evidence links state both the inspiration and its limits.
# The ontology is evaluated as an engineering taxonomy, not a biological model.

version: 2

components:
  - id: PFC
    region: prefrontal cortex within distributed control networks
    function: Cognitive control — maintain goals and task rules and bias processing across networks
    neuroscience_inspiration: >
      Prefrontal regions participate in distributed networks for goal maintenance,
      working-memory representation, strategy, and cognitive control.
    construct: Orchestrator (the main agent loop + its routing/state logic)
    store: live session + explicit task/plan state
    software_adaptation: explicit routing decisions, task state, and auditable traces
    analogy_limit: Biological cognitive control is distributed and adaptive, not a single deterministic dispatcher.
    evidence:
      - https://pmc.ncbi.nlm.nih.gov/articles/PMC8616903/
    failure_mode: >
      Wrong routing: pulls from the wrong memory, picks the wrong tool, or never
      decides at all and thrashes. This is a software routing failure, not a
      clinical equivalence.
    diagnostic: >
      Did the agent consult the right store for this kind of question? Trace one
      decision: which memory did it read, and was that the correct one to read?

  - id: HC
    region: hippocampal formation within medial-temporal/cortical memory networks
    function: Rapid relational and contextual binding and reinstatement
    neuroscience_inspiration: >
      The hippocampal formation rapidly binds relations among elements of an
      experience; an index to distributed cortical representations is one
      influential account.
    construct: Graph / episodic memory (event log + entity relations)
    store: append-only session trace + a structured decision/event log + entity graph
    software_adaptation: append-only records, stable IDs, timestamps, and preserved provenance
    analogy_limit: Biological episodic memory is reconstructive and transformable, not an immutable event log.
    evidence:
      - https://pubmed.ncbi.nlm.nih.gov/17696170/
      - https://pubmed.ncbi.nlm.nih.gov/31334573/
    failure_mode: >
      Context breaks: the agent acts on a stale prior, re-asks something already
      settled, or cannot connect two events that belong together because the
      contextual record is missing, ambiguous, or linked incorrectly.
    diagnostic: >
      When the agent recalled a past event, was the binding (who / what / when /
      which thread) intact, or did it confabulate the link?

  - id: ATL
    region: bilateral anterior temporal lobes within a distributed semantic network
    function: Transmodal semantic integration within a wider hub-and-control system
    neuroscience_inspiration: >
      Bilateral anterior temporal regions are proposed as a transmodal hub, while
      modality-specific representation and semantic control depend on wider networks.
    construct: Provenance-bearing semantic memory with lexical or embedding retrieval
    store: notes / documents / references with source, freshness, and conflict metadata
    software_adaptation: explicit provenance, freshness checks, and optional vector or lexical indexes
    analogy_limit: The ATL is not a sole fact store, and a vector index is not a neural homologue.
    evidence:
      - https://pubmed.ncbi.nlm.nih.gov/27881854/
    failure_mode: >
      Meaning errors: misreads a concept, follows a dangling link, or treats a
      secondary source as primary. Also *staleness*: an index that fossilizes and
      keeps returning an outdated view.
    diagnostic: >
      Is the retrieved knowledge both relevant *and* fresh? Did the agent verify a
      cited claim against the primary source, or trust the embedding's nearest hit?

  - id: BG
    region: cortico-basal-ganglia-thalamo-cortical circuits
    function: Learned action selection, reinforcement and habit learning, and adaptive gating
    neuroscience_inspiration: >
      Basal-ganglia circuits contribute to learned action selection and the
      context-dependent gating of motor and cognitive representations.
    construct: Rule memory — static (config, instruction files) + dynamic (pre-action guards)
    store: instruction/config files + deterministic pre-action hooks
    software_adaptation: deterministic pre-action guards harden the gating motif into auditable policy
    analogy_limit: Biological basal-ganglia gating is adaptive and networked, not a Boolean rule engine.
    evidence:
      - https://pubmed.ncbi.nlm.nih.gov/21498067/
      - https://pubmed.ncbi.nlm.nih.gov/26719851/
    failure_mode: >
      A declared policy is not enforced at action time, or a guard blocks or
      allows the wrong case.
    diagnostic: >
      For a known rule, is there a deterministic gate that actually fires, or does
      enforcement depend on the model "remembering" in the moment?

  - id: CB
    region: cerebellum within cerebro-cerebellar loops
    function: Prediction, timing, coordination, sequence processing, and error-based adaptation
    neuroscience_inspiration: >
      Cerebellar circuits contribute to prediction, coordination, timing, and
      error-based adaptation in motor and some cognitive domains.
    construct: Executable harness (a script that owns the fallback loop end-to-end)
    store: runnable code, not prose instructions
    software_adaptation: executable code owns an arbitrary fallback sequence through completion or explicit failure
    analogy_limit: A general-purpose workflow runner is a software extension, not a proposed cerebellar mechanism.
    evidence:
      - https://pmc.ncbi.nlm.nih.gov/articles/PMC5477675/
      - https://pubmed.ncbi.nlm.nih.gov/29643480/
    failure_mode: >
      Recalls the procedure but abandons the loop after the first path fails:
      "tried one thing, gave up" before registered alternatives are exhausted.
    diagnostic: >
      Is the multi-step fallback externalized as code that runs to completion, or
      re-narrated by the model each time (and thus quietly droppable mid-loop)?
    note: >
      Distinct from BG. BG enforces a *rule* (a single allow/deny decision); CB
      executes a *sequence* (a loop with fallbacks). They fail differently and are
      fixed by different mechanisms, so they are separate components even though
      both are "procedural."

  - id: IPS
    region: intraparietal sulcus within a distributed numerical network
    function: Quantity and magnitude representation and online calculation, often approximate
    neuroscience_inspiration: >
      The intraparietal sulcus is consistently involved in quantity and magnitude
      processing; exact verbal arithmetic and fact retrieval recruit broader networks.
    construct: Numerical store (a queryable mirror for numbers the model must not estimate)
    store: a small database / structured log of counts and metrics
    software_adaptation: exact values are delegated to a queryable source of truth
    analogy_limit: The exact store is a deliberate complement to approximate neural and model magnitude representations, not a replica.
    evidence:
      - https://pubmed.ncbi.nlm.nih.gov/20957581/
      - https://pubmed.ncbi.nlm.nih.gov/14572527/
    failure_mode: >
      Estimates or misreports a count instead of reading it from an authoritative source.
    diagnostic: >
      Was every quantity in the output read from a source, or did some get
      estimated from memory?

  - id: TH
    region: thalamic nuclei within thalamocortical circuits
    function: Relay and modulate task-relevant signals and coordinate cortical interactions
    neuroscience_inspiration: >
      Thalamic nuclei select, amplify, relay, and coordinate signals across
      distributed thalamocortical networks.
    construct: Input gate (a preventive pre-action filter)
    store: pre-action security/write guards
    software_adaptation: selective routing is translated into a pre-execution security and policy boundary
    analogy_limit: The thalamus is not a single perimeter filter or biological security gateway.
    evidence:
      - https://pubmed.ncbi.nlm.nih.gov/29184210/
    failure_mode: >
      Dangerous input passes unfiltered: an unsafe deserialization, an injected
      payload, a write that should never have been allowed through.
    diagnostic: >
      Is there a filter on the *input* path that blocks the dangerous case before
      it executes, rather than catching the damage afterward?

# Channels are transfer mechanisms *between* components (the sleep / recall analogs).
# They are not components and are not counted as such.
channels:
  - id: consolidation
    analog: offline replay and time-dependent systems-level reorganization; sleep can facilitate but is not exclusive
    direction: episodic evidence -> derived semantic/rule representation; retain and link the source episode
    function: >
      Promote a one-off episode into a reusable, decontextualized pattern. A failure
      handled once becomes a rule everyone can apply next time.
    failure_mode: >
      If it never runs, retrieval returns a soup of raw fragments instead of distilled
      knowledge, and the agent re-derives the same lesson endlessly.

  - id: reconsolidation
    analog: reactivation-dependent destabilization and restabilization under boundary conditions
    direction: on retrieval, optionally create a versioned superseding update
    function: >
      When a memory is recalled, detect that it is now stale or conflicts with newer
      information, and update it (with human approval) rather than re-acting on the
      outdated version.
    failure_mode: >
      If retrieval only ever surfaces the latest entry, older stale candidates are
      hidden permanently and never corrected.

# Optional: a finer-grained diagnostic lens for confident-but-wrong behavior, where a
# plain component error is not specific enough. Not components; diagnostic aids.
# These are diagnostic metaphors, not anatomical localization or clinical equivalence.
clinical_error_lens:
  - name: value-judgment failure
    associated_networks: ventromedial prefrontal and wider valuation/control networks
    symptom: acts inappropriately while knowing the rule (loss of social/contextual judgment)
    agent_analog: routes around a denied action, or runs a compound step without permission

  - name: confabulation
    associated_networks: distributed frontal, limbic, memory, and basal-forebrain networks
    symptom: confident fabrication presented as fact
    agent_analog: builds a confident, wrong premise and reasons forward from it (deeper than a plain semantic error)

# A note on "is the loop actually closed?"
# Existence of a component is one axis; whether its loop runs *without a human in it*
# is a separate axis worth tracking honestly. In the current software implementation,
# BG- and TH-inspired guards close deterministic allow/deny loops. The semantic and
# executive parts (PFC routing, advisory self-checks) stay open: they depend on the
# model's judgment in the moment, which is exactly why they cannot be fully automated
# away. This contrast describes the software implementation, not the determinism
# of biological circuits. Mapping the brain does not make a hard problem
# deterministic; it tells you *which* software loops are still open, and why.
