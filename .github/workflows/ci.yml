name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python
        run: |
          python -m py_compile \
            src/brain_ai_memory/*.py \
            tests/test_runtime.py \
            tests/test_component_ablation.py \
            benchmarks/run_component_ablation.py \
            benchmarks/plot_component_ablation.py \
            benchmarks/run_runtime_contract.py \
            benchmarks/plot_retrieval_tradeoff.py \
            benchmarks/run_longmemeval_pilot.py \
            benchmarks/validate_manifest.py \
            evidence/lifecycle_under_budget.py \
            examples/01_guard_in_action.py \
            examples/02_lifecycle_decision.py \
            templates/hooks/behavioral-guard.py \
            templates/hooks/self-check-trigger.py
      - name: Install public runtime
        run: python -m pip install .
      - name: Test public runtime and adapters
        run: |
          python -W error::ResourceWarning -m unittest discover -s tests -v
          python benchmarks/run_runtime_contract.py --output /tmp/runtime-contract.json
          python benchmarks/run_component_ablation.py --output /tmp/component-ablation
          python - <<'PY'
          import json
          result = json.load(open('/tmp/runtime-contract.json'))
          runtime = next(row for row in result['summary'] if row['condition'] == 'brain-ai-runtime')
          assert runtime['passed'] == 14 and runtime['total'] == 14
          ablation = json.load(open('/tmp/component-ablation/summary.json'))
          conditions = {row['condition']: row for row in ablation['conditions']}
          assert conditions[ablation['flat_condition']]['passed'] == 1
          assert conditions[ablation['full_condition']]['passed'] == 20
          assert ablation['record_count'] == 420
          PY
          runtime_home="$(mktemp -d)"
          brain-ai --home "$runtime_home" init
          brain-ai --home "$runtime_home" demo
          brain-ai --home "$runtime_home" doctor
      - name: Run examples and self-tests
        run: |
          python examples/01_guard_in_action.py
          python examples/02_lifecycle_decision.py
          python templates/hooks/behavioral-guard.py --selftest
          python templates/hooks/self-check-trigger.py --selftest
          python evidence/lifecycle_under_budget.py
      - name: Validate public artifacts
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          root = Path("benchmarks/pilots/longmemeval-s-retrieval-20260714")
          script_hash = hashlib.sha256(
              Path("benchmarks/run_longmemeval_pilot.py").read_bytes()
          ).hexdigest()

          json.loads(Path("evidence/operational-snapshot-2026-07-14.json").read_text())
          json.loads((root / "summary.json").read_text())

          for manifest_path in sorted(root.glob("*/manifest.json")):
              manifest = json.loads(manifest_path.read_text())
              assert manifest["condition"]["implementation_sha256"] == script_hash
              assert manifest["repository_dirty"] is False
              run_dir = manifest_path.parent
              for key, relative in manifest["artifacts"].items():
                  expected = manifest["artifact_sha256"][key]
                  actual = hashlib.sha256((run_dir / relative).read_bytes()).hexdigest()
                  assert actual == expected, f"{run_dir.name}: {relative}"
              for name in ("predictions.jsonl", "retrieval.jsonl"):
                  records = [json.loads(line) for line in (run_dir / name).read_text().splitlines()]
                  assert len(records) == 500, f"{run_dir.name}: {name}"

          ablation_root = Path("benchmarks/pilots/component-ablation-20260715")
          manifest = json.loads((ablation_root / "manifest.json").read_text())
          assert manifest["repository_dirty"] is False
          assert manifest["input_sha256"]["runner"] == hashlib.sha256(
              Path("benchmarks/run_component_ablation.py").read_bytes()
          ).hexdigest()
          for name, expected in manifest["artifact_sha256"].items():
              actual = hashlib.sha256((ablation_root / name).read_bytes()).hexdigest()
              assert actual == expected, name
          records = (ablation_root / "records.jsonl").read_text().splitlines()
          assert len(records) == 420
          PY
          for manifest in benchmarks/pilots/longmemeval-s-retrieval-20260714/*/manifest.json; do
            python benchmarks/validate_manifest.py "$manifest"
          done
