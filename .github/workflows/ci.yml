name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  compatibility:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install base package
        run: python -m pip install .
      - name: Test core runtime and adoption workflow
        run: |
          python -W error::ResourceWarning -m unittest discover -s tests -p "test_runtime.py" -v
          python -W error::ResourceWarning -m unittest discover -s tests -p "test_workspace.py" -v

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The recorded ablation manifest verifies source blobs at its exact
          # historical commit, not against whichever release is current.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python
        run: |
          python -m py_compile \
            src/brain_ai_memory/*.py \
            tests/test_runtime.py \
            tests/test_workspace.py \
            tests/test_e2e.py \
            tests/test_component_ablation.py \
            benchmarks/run_component_ablation.py \
            benchmarks/plot_component_ablation.py \
            benchmarks/run_runtime_contract.py \
            benchmarks/plot_retrieval_tradeoff.py \
            benchmarks/run_longmemeval_pilot.py \
            benchmarks/validate_manifest.py \
            evidence/lifecycle_under_budget.py \
            examples/01_guard_in_action.py \
            examples/02_lifecycle_decision.py \
            templates/hooks/behavioral-guard.py \
            templates/hooks/self-check-trigger.py
      - name: Install public runtime
        run: python -m pip install ".[mcp,plot]"
      - name: Test public runtime and adapters
        run: |
          python -W error::ResourceWarning -m unittest discover -s tests -v
          python benchmarks/run_runtime_contract.py --output /tmp/runtime-contract.json
          python benchmarks/run_component_ablation.py \
            --output /tmp/component-ablation \
            --reference-manifest benchmarks/pilots/component-ablation-20260715/manifest.json \
            --verify-source-provenance
          python benchmarks/plot_component_ablation.py \
            --summary /tmp/component-ablation/summary.json \
            --output /tmp/component-ablation.png
          test -s /tmp/component-ablation.png
          python - <<'PY'
          import json
          result = json.load(open('/tmp/runtime-contract.json'))
          runtime = next(row for row in result['summary'] if row['condition'] == 'brain-ai-runtime')
          assert runtime['passed'] == 14 and runtime['total'] == 14
          ablation = json.load(open('/tmp/component-ablation/summary.json'))
          conditions = {row['condition']: row for row in ablation['conditions']}
          assert conditions[ablation['flat_condition']]['passed'] == 1
          assert conditions[ablation['full_condition']]['passed'] == 20
          assert ablation['record_count'] == 420
          PY
          runtime_home="$(mktemp -d)"
          brain-ai --home "$runtime_home" init
          brain-ai --home "$runtime_home" tour
          brain-ai --home "$runtime_home" ontology
          brain-ai --home "$runtime_home" doctor
          python - <<'PY'
          import tempfile
          from pathlib import Path
          from brain_ai_memory.mcp_server import create_mcp_server

          with tempfile.TemporaryDirectory() as tmp:
              server = create_mcp_server(Path(tmp) / ".brain-ai")
              names = {tool.name for tool in server._tool_manager.list_tools()}
              assert {"brain_context", "brain_check_action", "brain_checkpoint"} <= names
          PY
      - name: Run examples and self-tests
        run: |
          python examples/01_guard_in_action.py
          python examples/02_lifecycle_decision.py
          python templates/hooks/behavioral-guard.py --selftest
          python templates/hooks/self-check-trigger.py --selftest
          python evidence/lifecycle_under_budget.py
      - name: Validate public artifacts
        run: |
          python - <<'PY'
          import hashlib
          import json
          import tomllib
          from pathlib import Path

          import yaml

          from brain_ai_memory import __version__

          project = tomllib.loads(Path("pyproject.toml").read_text())
          citation = yaml.safe_load(Path("CITATION.cff").read_text())
          assert project["project"]["version"] == __version__
          assert str(citation["version"]) == __version__

          root = Path("benchmarks/pilots/longmemeval-s-retrieval-20260714")
          script_hash = hashlib.sha256(
              Path("benchmarks/run_longmemeval_pilot.py").read_bytes()
          ).hexdigest()

          json.loads(Path("evidence/operational-snapshot-2026-07-14.json").read_text())
          json.loads((root / "summary.json").read_text())

          for manifest_path in sorted(root.glob("*/manifest.json")):
              manifest = json.loads(manifest_path.read_text())
              assert manifest["condition"]["implementation_sha256"] == script_hash
              assert manifest["repository_dirty"] is False
              run_dir = manifest_path.parent
              for key, relative in manifest["artifacts"].items():
                  expected = manifest["artifact_sha256"][key]
                  actual = hashlib.sha256((run_dir / relative).read_bytes()).hexdigest()
                  assert actual == expected, f"{run_dir.name}: {relative}"
              for name in ("predictions.jsonl", "retrieval.jsonl"):
                  records = [json.loads(line) for line in (run_dir / name).read_text().splitlines()]
                  assert len(records) == 500, f"{run_dir.name}: {name}"

          ablation_root = Path("benchmarks/pilots/component-ablation-20260715")
          manifest = json.loads((ablation_root / "manifest.json").read_text())
          assert manifest["repository_dirty"] is False
          assert manifest["repository_commit"] == "d0d675ead16b96b6f4ac0a5aaab7ddcf20786ba7"
          assert manifest["semantic_outcome"]["normalization"] == "component-ablation-outcome-v1"
          assert len(manifest["implementation_sha256"]) == 8
          for name, expected in manifest["artifact_sha256"].items():
              actual = hashlib.sha256((ablation_root / name).read_bytes()).hexdigest()
              assert actual == expected, name
          records = (ablation_root / "records.jsonl").read_text().splitlines()
          assert len(records) == 420
          PY
          for manifest in benchmarks/pilots/longmemeval-s-retrieval-20260714/*/manifest.json; do
            python benchmarks/validate_manifest.py "$manifest"
          done

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and validate distributions
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
      - name: Install and smoke-test the wheel
        run: |
          wheel="$(find "$GITHUB_WORKSPACE/dist" -maxdepth 1 -name '*.whl' -print -quit)"
          python -m venv /tmp/brain-ai-wheel
          /tmp/brain-ai-wheel/bin/python -m pip install "$wheel[mcp]"
          cd /tmp
          /tmp/brain-ai-wheel/bin/brain-ai --home /tmp/brain-ai-home init
          /tmp/brain-ai-wheel/bin/brain-ai --home /tmp/brain-ai-home ontology
          /tmp/brain-ai-wheel/bin/brain-ai \
            audit "$GITHUB_WORKSPACE/templates/memory/MEMORY.skeleton.md" \
            --entity wheel-smoke \
            --no-save
          /tmp/brain-ai-wheel/bin/python \
            -W error::ResourceWarning "$GITHUB_WORKSPACE/tests/test_e2e.py" -v
      - name: Test the self-contained source distribution
        run: |
          sdist="$(find "$GITHUB_WORKSPACE/dist" -maxdepth 1 -name '*.tar.gz' -print -quit)"
          mkdir -p /tmp/brain-ai-sdist
          tar -xzf "$sdist" -C /tmp/brain-ai-sdist
          source_dir="$(find /tmp/brain-ai-sdist -mindepth 1 -maxdepth 1 -type d -print -quit)"
          cd "$source_dir"
          PYTHONPATH=src /tmp/brain-ai-wheel/bin/python \
            -W error::ResourceWarning -m unittest discover -s tests -v
